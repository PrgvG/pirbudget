services:
  mongodb:
    image: mongo:8.0
    container_name: pirbudget-mongodb
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=pirbudget
    volumes:
      - mongodb_data:/data/db
    networks:
      - pirbudget-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: pirbudget-mongo-express
    ports:
      - '8082:8081'
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin
    depends_on:
      - mongodb
    networks:
      - pirbudget-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pirbudget-backend
    ports:
      - '3002:3001'
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=mongodb://admin:password@mongodb:27017/pirbudget?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    depends_on:
      - mongodb
    networks:
      - pirbudget-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pirbudget-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - pirbudget-network
    restart: unless-stopped

networks:
  pirbudget-network:
    driver: bridge

volumes:
  mongodb_data:
